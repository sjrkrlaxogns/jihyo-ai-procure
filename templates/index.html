<!DOCTYPE html>
<html>
<head>
    <title>지효초 품의서 생성기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; max-width: 900px; margin: auto; background: #f8f9fa; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .box { margin-bottom: 20px; padding: 15px; border: 1px solid #e9ecef; border-radius: 8px; }
        textarea { width: 100%; height: 100px; margin-top: 10px; border: 1px solid #ced4da; padding: 10px; border-radius: 4px; resize: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: center; }
        th { background: #e9ecef; }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-green { background: #28a745; color: white; }
        .btn-blue { background: #007bff; color: white; display: none; }
        .footer-end { text-align: right; margin-top: 20px; font-weight: bold; font-size: 1.2em; color: #333; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #004085; border-bottom: 2px solid #004085; padding-bottom: 10px;">지효초 AI 품의서 시스템</h2>
        
        <div class="box">
            <b>1. 품의 제목:</b><br>
            <input type="text" id="title" style="width:100%; padding:10px; margin-top:5px; border:1px solid #ced4da; border-radius:4px;">
        </div>

        <div class="box">
            <b>2. 파일 선택 (기존 방식):</b><br>
            <input type="file" id="fileInput" accept="image/*, .pdf">
        </div>

        <div class="box">
            <b>3. 내용/이미지 붙여넣기 (추가 기능):</b><br>
            <textarea id="content-area" placeholder="텍스트 복사/붙여넣기 혹은 스크린샷 찍고 Ctrl+V 하세요."></textarea>
        </div>

        <div class="btn-group">
            <button onclick="runAI()" class="btn btn-green">AI 품의서 생성하기</button>
            <button onclick="saveExcel()" id="excelBtn" class="btn btn-blue">엑셀 다운로드</button>
        </div>

        <div id="result-view"></div>
    </div>

    <script>
        let itemsData = [];
        let pastedImg = null;

        document.getElementById('content-area').addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { pastedImg = ev.target.result; alert("이미지가 붙여넣기 되었습니다!"); };
                    reader.readAsDataURL(items[i].getAsFile());
                }
            }
        });

        async function runAI() {
            const fileInput = document.getElementById('fileInput');
            const textArea = document.getElementById('content-area');
            let res;

            if (fileInput.files.length > 0) {
                const fd = new FormData(); fd.append('file', fileInput.files[0]);
                res = await fetch('/api/analyze', { method: 'POST', body: fd });
            } else {
                res = await fetch('/api/analyze', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text: textArea.value, image: pastedImg })
                });
            }
            const data = await res.json();
            itemsData = data;
            showTable(data);
        }

        function showTable(items) {
            let total = 0;
            let html = '<table><tr><th>순번</th><th>내용</th><th>규격</th><th>단위</th><th>수량</th><th>단가</th><th>금액</th></tr>';
            items.forEach((it, i) => {
                const sum = it.qty * it.price; total += sum;
                html += `<tr><td>${i+1}</td><td>${it.name}</td><td></td><td>개</td><td>${it.qty}</td><td>${it.price.toLocaleString()}</td><td>${sum.toLocaleString()}</td></tr>`;
            });
            html += '</table>';
            html += `<div class="footer-end">총 합계: ${total.toLocaleString()}원  &nbsp;&nbsp;끝.</div>`;
            document.getElementById('result-view').innerHTML = html;
            document.getElementById('excelBtn').style.display = 'block';
        }

        async function saveExcel() {
            const res = await fetch('/api/download', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ items: itemsData })
            });
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = '지효초_품의목록.xlsx';
            a.click();
        }
    </script>
</body>
</html>
