<!DOCTYPE html>
<html>
<head>
    <title>지효초 품의서 생성기</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        #drop-area { border: 2px dashed #ccc; padding: 20px; text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .result-footer { margin-top: 10px; font-weight: bold; text-align: right; }
    </style>
</head>
<body>
    <h2>지효초 AI 품의서 시스템</h2>
    
    <label>품의 제목:</label><br>
    <input type="text" id="title" style="width:100%"><br><br>

    <label>내용 (텍스트 복사/붙여넣기 또는 이미지 Ctrl+V):</label><br>
    <textarea id="content-area" placeholder="내용을 입력하거나 스크린샷을 Ctrl+V로 붙여넣으세요."></textarea>

    <button onclick="analyze()" style="padding:10px 20px; background:#28a745; color:white; border:none; cursor:pointer;">AI 품의서 생성하기</button>
    <button onclick="downloadExcel()" id="down-btn" style="display:none; padding:10px 20px; background:#007bff; color:white; border:none; cursor:pointer;">엑셀 다운로드</button>

    <div id="result-table"></div>

    <script>
        let lastResult = [];
        let pastedImage = null;

        // 이미지 붙여넣기 감지 로직
        document.getElementById('content-area').addEventListener('paste', function(e) {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        pastedImage = event.target.result;
                        alert("이미지가 인식되었습니다!");
                    };
                    reader.readAsDataURL(blob);
                }
            }
        });

        async function analyze() {
            const text = document.getElementById('content-area').value;
            const res = await fetch('/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text, image: pastedImage})
            });
            const data = await res.json();
            lastResult = data;
            
            let html = '<table><tr><th>순번</th><th>내용</th><th>단위</th><th>수량</th><th>단가</th><th>금액</th></tr>';
            let total = 0;
            data.forEach((item, i) => {
                const priceSum = item.qty * item.price;
                total += priceSum;
                html += `<tr><td>${i+1}</td><td>${item.name}</td><td>개</td><td>${item.qty}</td><td>${item.price.toLocaleString()}</td><td>${priceSum.toLocaleString()}</td></tr>`;
            });
            html += '</table>';
            html += `<div class="result-footer">총계: ${total.toLocaleString()}원  끝.</div>`;
            
            document.getElementById('result-table').innerHTML = html;
            document.getElementById('down-btn').style.display = 'inline-block';
        }

        async function downloadExcel() {
            const res = await fetch('/api/download', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({items: lastResult})
            });
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '품의목록.xlsx';
            a.click();
        }
    </script>
</body>
</html>
